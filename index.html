<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monglish International Academy - Smart Canvas</title>
    <style>
        :root {
            --primary: #1b4f72; 
            --bg: #fdfefe;
            --panel-bg: #f4f6f7;
            --text: #2c3e50;
            --correct: #27ae60;
            --incorrect: #c0392b;
            --accent-blue: #2980b9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        header {
            margin-bottom: 15px;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 { margin: 0; font-size: 24px; color: var(--primary); }
        .brand-sub { font-weight: bold; color: #7f8c8d; }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            flex: 1;
            min-height: 0;
        }

        .panel {
            background: var(--panel-bg);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        h2 { margin-top: 0; font-size: 18px; border-bottom: 1px solid #ccc; padding-bottom: 5px; color: #34495e; }

        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
        }

        button.action-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        button.action-btn:hover { background: #11334a; }
        button.blue-btn { background: var(--accent-blue); }
        button.blue-btn:hover { background: #1f618d; }

        .result-display {
            background: white;
            padding: 15px;
            border-radius: 6px;
            border-left: 4px solid var(--accent-blue);
            flex: 1;
            overflow-y: auto;
            font-size: 14px;
        }

        .vocab-tag {
            display: inline-block;
            background: #eaf2f8;
            color: var(--accent-blue);
            padding: 6px 12px;
            margin: 4px;
            border-radius: 20px;
            font-weight: 500;
        }

        .correction-box {
            background: white;
            padding: 15px;
            border-radius: 6px;
            border-left: 4px solid var(--incorrect);
            margin-bottom: 15px;
            display: none; 
        }

        .log-container {
            flex: 1;
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            padding: 10px;
            overflow-y: auto;
        }

        .log-item {
            padding: 10px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }

        .sentence-bad { color: var(--incorrect); text-decoration: line-through; display: block; margin-bottom: 2px; }
        .sentence-good { color: var(--correct); font-weight: bold; display: block; }
        .grammar-tip { font-size: 12px; color: #7f8c8d; font-style: italic; display: block; margin-top: 2px; }

        .copy-btn {
            margin-top: 15px;
            background: #2c3e50;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        .copy-btn:hover { background: #1a252f; }
        
        #status { font-size: 12px; margin-top: -10px; margin-bottom: 10px; color: #7f8c8d; font-weight: bold;}
    </style>
</head>
<body>

    <header>
        <h1>Monglish International Academy</h1>
        <span class="brand-sub">One-on-One Speaking Assistant</span>
    </header>

    <div class="dashboard">
        <div class="panel">
            <h2>🔍 Live Thesaurus Search</h2>
            <div class="search-box">
                <input type="text" id="vocab-search-input" placeholder="Type words like big, happy, very..." onkeydown="if(event.key==='Enter') searchWord()">
                <button class="action-btn blue-btn" onclick="searchWord()">Search Vocab</button>
            </div>
            <div class="result-display" id="vocab-result">
                <p style="color: #999;">Thesaurus is ready.</p>
            </div>
        </div>

        <div class="panel">
            <h2>📝 Smart Correction Pad</h2>
            <div class="search-box">
                <input type="text" id="student-raw-input" placeholder="Type what the student said..." onkeydown="if(event.key==='Enter') analyzeGrammar()">
                <button class="action-btn" onclick="analyzeGrammar()">Check Grammar</button>
            </div>
            <div id="status">Ready</div>

            <div class="correction-box" id="suggested-correction-block">
                <h4 style="margin: 0 0 8px 0; color: var(--primary);">Suggested Fix:</h4>
                <div id="suggestion-text"></div>
                <button class="action-btn" style="margin-top: 10px; padding: 6px 12px; font-size: 12px;" onclick="acceptAndLogFix()">Log this Perfect Version</button>
            </div>

            <h2>📋 Today's Class Feedback Log</h2>
            <div class="log-container" id="log-container">
                <p id="empty-log-msg" style="color: #999; text-align: center; margin-top: 20px;">No corrections logged yet.</p>
            </div>

            <button class="copy-btn" onclick="copySummary()">📋 Copy Session Notes for Student</button>
        </div>
    </div>

    <script>
        let temporaryFix = { bad: "", good: "", tip: "" };
        let sessionLogs = [];

        async function searchWord() {
            const input = document.getElementById('vocab-search-input').value.trim();
            const resultDiv = document.getElementById('vocab-result');
            if (!input) return;
            
            resultDiv.innerHTML = '<p style="color: #7f8c8d; font-style: italic;">Searching...</p>';
            
            try {
                const response = await fetch(`https://dictionaryapi.dev{input}`);
                if (!response.ok) throw new Error();
                const data = await response.json();
                let synonyms = [];
                let definition = "";

                data.forEach(entry => {
                    entry.meanings.forEach(meaning => {
                        if (meaning.synonyms) synonyms.push(...meaning.synonyms);
                        meaning.definitions.forEach(def => {
                            if (def.synonyms) synonyms.push(...def.synonyms);
                            if (!definition) definition = def.definition;
                        });
                    });
                });

                synonyms = [...new Set(synonyms)].slice(0, 12); 
                let htmlOutput = `<h3>Results for "${input}":</h3><p><strong>Definition:</strong> ${definition || 'N/A'}</p>`;
                
                if (synonyms.length > 0) {
                    htmlOutput += `<p><strong>Advanced Synonyms:</strong></p>`;
                    synonyms.forEach(word => { htmlOutput += `<span class="vocab-tag">${word}</span>`; });
                } else {
                    htmlOutput += `<p><em>No direct synonyms found. Try looking up broader words.</em></p>`;
                }
                resultDiv.innerHTML = htmlOutput;
            } catch (error) {
                resultDiv.innerHTML = `<p style="color: #c0392b;">Word not found. Try another word.</p>`;
            }
        }

        async function analyzeGrammar() {
            const rawInput = document.getElementById('student-raw-input').value.trim();
            const statusText = document.getElementById('status');
            const correctionBlock = document.getElementById('suggested-correction-block');
            const suggestionText = document.getElementById('suggestion-text');

            if (!rawInput) return;
            statusText.textContent = "Checking grammar...";

            try {
                const response = await fetch('https://languagetool.org', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ text: rawInput, language: 'en-US' })
                });

                const data = await response.json();
                
                if (data.matches.length === 0) {
                    statusText.textContent = "Perfect Grammar!";
                    temporaryFix = { bad: rawInput, good: rawInput, tip: "Excellent!" };
                    suggestionText.innerHTML = `<span class="sentence-good">✅ ${rawInput}</span>`;
                    correctionBlock.style.borderColor = "#27ae60"; 
                } else {
                    statusText.textContent = `Found ${data.matches.length} issue(s).`;
                    let correctedText = rawInput;
                    let tips = [];
                    const sortedMatches = [...data.matches].sort((a, b) => b.offset - a.offset);
